name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  server:
    name: Go server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: server/go.sum
      - name: gofmt
        working-directory: server
        run: test -z "$(gofmt -l ./cmd ./internal)"
      - name: vet
        working-directory: server
        run: go vet ./...
      - name: test
        working-directory: server
        run: go test ./...

  ui:
    name: Web UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: install
        working-directory: ui
        run: npm ci
      - name: typecheck
        working-directory: ui
        run: npx tsc --noEmit
      - name: test
        working-directory: ui
        run: npm test
      - name: build
        working-directory: ui
        run: npm run build

  client-typescript:
    name: TypeScript client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: install
        working-directory: clients/typescript
        run: npm ci || npm install
      - name: typecheck
        working-directory: clients/typescript
        run: npx tsc --noEmit
      - name: test
        working-directory: clients/typescript
        run: npm test

  client-python:
    name: Python client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install
        working-directory: clients/python
        run: pip install -e ".[dev]"
      - name: test
        working-directory: clients/python
        run: python -m pytest

  client-go:
    name: Go client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: clients/go/go.sum
      - name: gofmt
        working-directory: clients/go
        run: test -z "$(gofmt -l .)"
      - name: vet
        working-directory: clients/go
        run: go vet ./...
      - name: test
        working-directory: clients/go
        run: go test ./...

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build
        run: docker build -t ai-chat:ci .
